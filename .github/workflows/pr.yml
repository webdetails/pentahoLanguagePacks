name: Language Pack Installer Pull Request Workflow

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RESOLVE_REPO_MIRROR: https://${{ vars.ARTIFACTORY_HOST }}/artifactory/pnt-mvn
  NEXUS_DEPLOY_USER: ${{ secrets.PENTAHO_CICD_ONE_USER }}
  NEXUS_DEPLOY_PASSWORD: ${{ secrets.PENTAHO_CICD_ONE_KEY }}

jobs:
  validate:
    name: Validate Language Packs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Retrieve Maven settings
        id: common-maven
        uses: pentaho/actions-common@stable

      - name: Run validation tests
        run: mvn test -pl assemblies/pentaho-plugin -s ${{ steps.common-maven.outputs.settings-file-path }} -B --no-transfer-progress

  build-installer:
    name: Build Installer Plugin
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Retrieve Maven settings
        id: common-maven
        uses: pentaho/actions-common@stable

      - name: Build plugin
        run: mvn clean package -DskipTests -s ${{ steps.common-maven.outputs.settings-file-path }} -B --no-transfer-progress

      - name: Upload installer zip
        uses: actions/upload-artifact@v7
        with:
          name: language-pack-installer
          path: assemblies/pentaho-plugin/target/language-pack-installer-pentaho-plugin-*.zip
          retention-days: 14

  build-one-locale:
    name: Build Representative Locale (pt_PT)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Retrieve Maven settings
        id: common-maven
        uses: pentaho/actions-common@stable

      # Build one full locale to verify the per-locale pipeline works end-to-end.
      # Full deployment of all locales happens in merge.yml via the dynamic matrix.
      - name: Build pt_PT locale
        run: mvn package -pl assemblies/pentaho-plugin -DlangCode=pt_PT -DskipTests -s ${{ steps.common-maven.outputs.settings-file-path }} -B --no-transfer-progress

      - name: Upload pt_PT zip
        uses: actions/upload-artifact@v7
        with:
          name: languagePack_pt_PT
          path: assemblies/pentaho-plugin/target/dist/languagePack_pt_PT-*.zip
          retention-days: 14
