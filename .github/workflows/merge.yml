name: Language Pack Installer Merge Workflow

on:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      skip_tests:
        type: boolean
        default: false
        description: "Skip Maven tests by adding -DskipTests."

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RESOLVE_REPO_MIRROR: https://${{ vars.ARTIFACTORY_HOST }}/artifactory/pnt-mvn
  NEXUS_DEPLOY_USER: ${{ secrets.PENTAHO_CICD_ONE_USER }}
  NEXUS_DEPLOY_PASSWORD: ${{ secrets.PENTAHO_CICD_ONE_KEY }}

jobs:
  validate:
    name: Validate Language Packs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Retrieve Maven settings
        id: common-maven
        uses: pentaho/actions-common@stable

      - name: Run validation tests
        run: |
          SKIP=${{ (github.event_name == 'workflow_dispatch' && inputs.skip_tests) && '-DskipTests' || '' }}
          mvn test -pl assemblies/pentaho-plugin $SKIP -s ${{ steps.common-maven.outputs.settings-file-path }} -B --no-transfer-progress

  # Scan data/ at runtime so the matrix always reflects the actual set of locales —
  # no hardcoded list, no manual updates when a new locale is added.
  setup-locale-matrix:
    name: Discover Locales
    runs-on: ubuntu-latest
    outputs:
      locales: ${{ steps.list.outputs.locales }}
    steps:
      - uses: actions/checkout@v6
      - name: List locales from data/
        id: list
        run: |
          LOCALES=$(ls data/ | grep -v '^en$\|^metadata' | sort \
            | jq -R -s 'split("\n") | map(select(length > 0))' -c)
          echo "locales=$LOCALES" >> "$GITHUB_OUTPUT"

  deploy-installer:
    name: Deploy Installer Plugin
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Retrieve Maven settings
        id: common-maven
        uses: pentaho/actions-common@stable

      - name: Deploy main installer to Artifactory
        run: |
          SKIP=${{ (github.event_name == 'workflow_dispatch' && inputs.skip_tests) && '-DskipTests' || '' }}
          mvn clean deploy $SKIP -s ${{ steps.common-maven.outputs.settings-file-path }} -B --no-transfer-progress

      - name: Upload installer zip
        uses: actions/upload-artifact@v7
        with:
          name: language-pack-installer
          path: assemblies/pentaho-plugin/target/language-pack-installer-pentaho-plugin-*.zip
          retention-days: 30

  deploy-locale:
    name: Deploy ${{ matrix.locale }}
    runs-on: ubuntu-latest
    needs: [ validate, setup-locale-matrix ]
    strategy:
      fail-fast: false
      matrix:
        locale: ${{ fromJson(needs.setup-locale-matrix.outputs.locales) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Retrieve Maven settings
        id: common-maven
        uses: pentaho/actions-common@stable

      # Each locale is built and deployed exactly once.
      # The build-language-pack profile (activated by -DlangCode) assembles the locale ZIP,
      # attaches it with the locale code as classifier via build-helper-maven-plugin, then
      # mvn deploy publishes it as:
      #   org.pentaho.ctools:language-pack-installer-pentaho-plugin:<version>:zip:<locale>
      - name: Build and deploy ${{ matrix.locale }}
        run: |
          mvn deploy -pl assemblies/pentaho-plugin -DlangCode=${{ matrix.locale }} -DskipTests \
            -s ${{ steps.common-maven.outputs.settings-file-path }} -B --no-transfer-progress

      - name: Upload ${{ matrix.locale }} zip
        uses: actions/upload-artifact@v7
        with:
          name: languagePack_${{ matrix.locale }}
          path: assemblies/pentaho-plugin/target/dist/languagePack_${{ matrix.locale }}-*.zip
          retention-days: 30
